      responses:
        '200':
          description: Grouped forecast by category
          schema:
            $ref: '#/definitions/GroupedForecastResponse'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden — requires Reader role
  /forecast/by-supplier:
    get:
      operationId: GetForecastBySupplier

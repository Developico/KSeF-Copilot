        '401':
          description: Unauthorized
  /ksef/session:
    post:
      operationId: StartKsefSession
      summary: Start KSeF Session
      description: Starts a new interactive session with KSeF.
      parameters:
        - name: body
          in: body
          required: true
          schema:
            type: object
            properties:
              nip:
                type: string
                description: NIP firmy
      responses:
        '200':
          description: Session started
          schema:
            $ref: '#/definitions/KsefSessionResponse'
        '400':
          description: Validation error
        '401':
          description: Unauthorized
    get:
      operationId: GetKsefSession
      summary: Get KSeF Session
      description: Returns the current active KSeF session, if any.
      parameters: []
      responses:
        '200':
          description: Current session
          schema:
            $ref: '#/definitions/KsefSessionGetResponse'
        '401':
          description: Unauthorized
    delete:
      operationId: EndKsefSession
      summary: End KSeF Session
      description: Terminates the current active KSeF session.
      parameters: []
      responses:
        '200':
          description: Session ended
          schema:
            $ref: '#/definitions/KsefEndSessionResponse'
        '401':
          description: Unauthorized
  /ksef/sync/preview:
    get:
      operationId: GetSyncPreview
      summary: Get Sync Preview
      description: Returns a preview of invoices available for import from KSeF.
      parameters:
        - name: nip
          in: query
          type: string
          required: false
          description: NIP firmy
        - name: dateFrom
          in: query
          type: string
          format: date-time
          required: false
          description: Start date (ISO 8601)
        - name: dateTo
          in: query
          type: string
          format: date-time
          required: false
          description: End date (ISO 8601)
      responses:
        '200':
          description: Sync preview
          schema:
            $ref: '#/definitions/SyncPreviewResponse'
        '401':
          description: Unauthorized
  /ksef/sync/import:
    post:
      operationId: ImportSync
      summary: Import Invoices from KSeF
      description: Imports selected invoices from KSeF based on reference numbers.
      parameters:
        - name: body
          in: body
          required: true
          schema:
            type: object
            required:
              - referenceNumbers
            properties:
              referenceNumbers:
                type: array
                items:
                  type: string
                description: KSeF reference numbers to import
              nip:
                type: string
                description: NIP firmy
              settingId:
                type: string
                description: Company setting ID (UUID)
      responses:
        '200':
          description: Import result
          schema:
            $ref: '#/definitions/SyncImportResult'
        '400':
          description: Validation error
        '401':
          description: Unauthorized

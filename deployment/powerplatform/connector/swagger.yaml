  /forecast/monthly:
    get:
      operationId: GetForecastMonthly
      summary: Get Monthly Expense Forecast
      description: >-
        Returns historical monthly expense data and AI-generated forecast
        for future months using statistical methods (moving average,
        linear regression, seasonal adjustment).
      x-ms-visibility: important
      parameters:
        - name: horizon
          in: query
          type: integer
          required: false
          description: Number of months to forecast (1, 6, or 12; default 6)
          enum:
            - 1
            - 6
            - 12
        - name: historyMonths
          in: query
          type: integer
          required: false
          description: Months of historical data to use (3–60, default 24)
        - name: settingId
          in: query
          type: string
          required: false
          description: ID ustawienia firmy (UUID)
        - name: tenantNip
          in: query
          type: string
          required: false
          description: NIP firmy (fallback jeśli brak settingId)
      responses:
        '200':
          description: Monthly forecast result
          schema:
            $ref: '#/definitions/ForecastResult'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden — requires Reader role
  /forecast/by-mpk:
    get:
      operationId: GetForecastByMpk
      summary: Get Forecast by Cost Center (MPK)

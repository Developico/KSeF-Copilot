      parameters: []
      responses:
        '200':
          description: System users list
          schema:
            type: object
            properties:
              data:
                type: array
                items:
                  $ref: '#/definitions/SystemUser'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden — requires Admin role
  /invoices/{id}/approve:
    post:
      operationId: ApproveInvoice
      summary: Approve Invoice
      description: >-
        Approve a pending invoice. User must be an authorized approver
        for the invoice's MPK center, or have Admin role (D2 fallback).
      x-ms-visibility: important
      parameters:
        - name: id
          in: path
          type: string
          required: true
          description: Invoice UUID
        - name: body
          in: body
          required: false
          schema:
            type: object
            properties:
              comment:
                type: string
                description: Optional approval comment
      responses:
        '200':
          description: Invoice approved
          schema:
            $ref: '#/definitions/ApprovalActionResult'
        '400':
          description: Invoice is not in Pending status or has no MPK
        '401':
          description: Unauthorized
        '403':
          description: Forbidden — user is not an authorized approver
        '404':
          description: Invoice not found
  /invoices/{id}/reject:
    post:
      operationId: RejectInvoice
      summary: Reject Invoice
      description: >-
        Reject a pending invoice. Comment is required.
        User must be an authorized approver for the invoice's MPK center.
      x-ms-visibility: important
      parameters:
        - name: id
          in: path
          type: string
          required: true
          description: Invoice UUID
        - name: body
          in: body
          required: true
          schema:
            type: object
            required:
              - comment
            properties:
              comment:
                type: string
                description: Rejection reason (required)
      responses:
        '200':
          description: Invoice rejected
          schema:
            $ref: '#/definitions/ApprovalActionResult'
        '400':
          description: Invoice is not in Pending status, no MPK, or missing comment
        '401':
          description: Unauthorized
        '403':
          description: Forbidden — user is not an authorized approver
        '404':
          description: Invoice not found
  /invoices/{id}/cancel-approval:
    post:
      operationId: CancelApproval
      summary: Cancel Approval
      description: >-
        Cancel a pending approval. Only Admin role can cancel (D16).
        Transitions from Pending → Cancelled.
      x-ms-visibility: important
      parameters:
        - name: id
          in: path
          type: string
          required: true
          description: Invoice UUID
        - name: body
          in: body
          required: false
          schema:
            type: object
            properties:
              comment:
                type: string
                description: Optional cancellation reason
      responses:
        '200':
          description: Approval cancelled
          schema:
            $ref: '#/definitions/ApprovalActionResult'
        '400':
          description: Invoice is not in Pending status
        '401':
          description: Unauthorized
        '403':
          description: Forbidden — requires Admin role
        '404':
          description: Invoice not found
  /invoices/{id}/refresh-approvers:
    post:
      operationId: RefreshApprovers
      summary: Refresh Invoice Approvers
      description: >-
        Refresh the approvers for an invoice's MPK center (D20).
        Returns the current number of approvers.
      parameters:
        - name: id
          in: path
          type: string
          required: true
          description: Invoice UUID
      responses:
        '200':
          description: Approvers refreshed
          schema:
            type: object
            properties:
              mpkCenterId:
                type: string
                format: uuid
              approverCount:
                type: integer
        '400':
          description: Invoice has no MPK center
        '401':
          description: Unauthorized
        '403':
          description: Forbidden — user is not authorized for this MPK
        '404':
          description: Invoice not found
  /invoices/bulk-approve:
    post:
      operationId: BulkApproveInvoices
      summary: Bulk Approve Invoices
      description: >-
        Approve multiple pending invoices at once (D17).
        Processes each invoice independently — partial success is possible.
      x-ms-visibility: important
      parameters:
        - name: body
          in: body
          required: true
          schema:
            type: object
            required:
              - invoiceIds
            properties:
              invoiceIds:
                type: array
                items:
                  type: string
                  format: uuid
                description: Array of invoice UUIDs to approve
              comment:
                type: string
                description: Optional approval comment applied to all invoices
      responses:
        '200':
          description: Bulk approval result
          schema:
            $ref: '#/definitions/BulkApproveResult'
        '400':
          description: Validation failed
        '401':
          description: Unauthorized
        '403':
          description: Forbidden — requires Reader role or higher
  /approvals/pending:
    get:
      operationId: ListPendingApprovals
      summary: List Pending Approvals
      description: >-
        List invoices pending approval for the current user.
        Admin sees all pending invoices; non-Admin sees only invoices
        for MPK centers where they are an assigned approver.
      x-ms-visibility: important
      parameters:
        - name: settingId
          in: query
          type: string
          required: true
          description: Setting/company UUID to scope the query
      responses:
        '200':
          description: Pending invoices list
          schema:
            type: object
            properties:
              data:
                type: array
                items:
                  $ref: '#/definitions/PendingInvoice'
              count:
                type: integer
        '401':
          description: Unauthorized
        '403':
          description: Forbidden — requires Reader role

  /mpk-centers/{id}/budget-status:
    get:
      operationId: GetMpkBudgetStatus
      summary: Get MPK Budget Status
      description: >-
        Get budget utilization status for a specific MPK center.
        Returns current period utilization, remaining budget, and warning flags.
        Returns null data if no budget is configured for the MPK.
      x-ms-visibility: important
      parameters:
        - name: id
          in: path
          type: string
          format: uuid
          required: true
          description: MPK center UUID
      responses:
        '200':
          description: Budget status (or null if no budget configured)
          schema:
            type: object
            properties:
              data:
                $ref: '#/definitions/BudgetStatus'
              message:
                type: string
        '400':
          description: MPK center ID required
        '401':
          description: Unauthorized
        '403':
          description: Forbidden — requires Reader role

  /budget/summary:
    get:
      operationId: GetBudgetSummary
      summary: Get Budget Summary
      description: >-
        Get budget utilization summary for all MPK centers with budget
        configured in a given setting. Returns only MPKs that have
        budgetAmount, budgetPeriod, and budgetStartDate set.
      x-ms-visibility: important
      parameters:
        - name: settingId
          in: query
          type: string
          required: true
          description: Setting/company UUID to scope the query
      responses:
        '200':
          description: Budget summary for all configured MPKs
          schema:
            type: object
            properties:
              data:
                type: array
                items:
                  $ref: '#/definitions/BudgetStatus'
              count:
                type: integer
        '400':
          description: settingId query parameter is required
        '401':
          description: Unauthorized
        '403':
          description: Forbidden — requires Reader role

  /notifications:
    get:
      operationId: GetNotifications
      summary: List Notifications
      description: >-
        List in-app notifications for the current user. Supports unreadOnly
        and top filters. The user is resolved from the Bearer token OID.
      x-ms-visibility: important
      parameters:
        - name: settingId
          in: query
          type: string
          required: true
          description: Setting/company UUID to scope the query
        - name: unreadOnly
          in: query
          type: boolean
          required: false
          description: If true, return only unread notifications
        - name: top
          in: query
          type: integer
          required: false
          description: Maximum number of notifications to return (default 50)
      responses:
        '200':
          description: Notification list
          schema:
            type: object
            properties:
              data:
                type: array
                items:
                  $ref: '#/definitions/Notification'
              count:
                type: integer
        '400':
          description: settingId query parameter is required
        '401':
          description: Unauthorized
        '403':
          description: Forbidden — requires Reader role

  /notifications/{id}/read:
    patch:
      operationId: MarkNotificationRead
      summary: Mark Notification as Read
      description: Marks a single notification as read.
      x-ms-visibility: advanced
      parameters:
        - name: id
          in: path
          type: string
          required: true
          description: Notification UUID
      responses:
        '200':
          description: Notification marked as read
          schema:
            type: object
            properties:
              success:
                type: boolean
        '400':
          description: Notification ID required
        '401':
          description: Unauthorized
        '403':
          description: Forbidden — requires Reader role

  /notifications/{id}/dismiss:
    post:
      operationId: DismissNotification
      summary: Dismiss Notification
      description: Dismisses (soft-deletes) a notification so it no longer appears.
      x-ms-visibility: advanced
      parameters:
        - name: id
          in: path
          type: string
          required: true
          description: Notification UUID
      responses:
        '200':
          description: Notification dismissed
          schema:
            type: object
            properties:
              success:
                type: boolean
        '400':
          description: Notification ID required
        '401':
          description: Unauthorized
        '403':
          description: Forbidden — requires Reader role

  /notifications/unread-count:
    get:
      operationId: GetUnreadNotificationCount
      summary: Get Unread Notification Count
      description: >-
        Returns the count of unread notifications for the current user.
        Useful for notification badge display.
      x-ms-visibility: important
      parameters:
        - name: settingId
          in: query
          type: string
          required: true
          description: Setting/company UUID to scope the query
      responses:
        '200':
          description: Unread count
          schema:
            type: object
            properties:
              count:
                type: integer
        '400':
          description: settingId query parameter is required
        '401':
          description: Unauthorized
        '403':
          description: Forbidden — requires Reader role

  /reports/budget-utilization:
    get:
      operationId: GetBudgetUtilizationReport
      summary: Budget Utilization Report
      description: >-
        Generates a budget utilization report across all MPK centers (or a
        single MPK) for the current budget period. Includes totals rollup.
      x-ms-visibility: important
      parameters:
        - name: settingId
          in: query
          type: string
          required: true
          description: Setting/company UUID
        - name: mpkCenterId
          in: query
          type: string
          required: false
          description: Optional MPK center UUID to narrow the report
          x-ms-dynamic-values:
            operationId: ListMpkCenters
            value-collection: mpkCenters
            value-path: id
            value-title: name
            parameters:
              settingId:
                parameter: settingId
      responses:
        '200':
          description: Budget utilization report
          schema:
            type: object
            properties:
              data:
                $ref: '#/definitions/BudgetUtilizationReport'
        '400':
          description: settingId query parameter is required
        '401':
          description: Unauthorized
        '403':
          description: Forbidden — requires Reader role

  /reports/approval-history:
    get:
      operationId: GetApprovalHistoryReport
      summary: Approval History Report
      description: >-
        Returns approval history for invoices that have been through the
        workflow (non-Draft). Supports date range, MPK, and status filters.
      x-ms-visibility: important
      parameters:
        - name: settingId
          in: query
          type: string
          required: true
          description: Setting/company UUID
        - name: dateFrom
          in: query
          type: string
          required: false
          description: Start date filter (ISO 8601)
        - name: dateTo
          in: query
          type: string
          required: false
          description: End date filter (ISO 8601)
        - name: mpkCenterId
          in: query
          type: string
          required: false
          description: Optional MPK center UUID
          x-ms-dynamic-values:
            operationId: ListMpkCenters
            value-collection: mpkCenters
            value-path: id
            value-title: name
            parameters:
              settingId:
                parameter: settingId
        - name: status
          in: query
          type: string
          required: false
          description: Approval status filter
          enum:
            - Pending
            - Approved
            - Rejected
            - Cancelled
      responses:
        '200':
          description: Approval history report
          schema:
            type: object
            properties:
              data:
                $ref: '#/definitions/ApprovalHistoryReport'
        '400':
          description: settingId query parameter is required
        '401':
          description: Unauthorized
        '403':
          description: Forbidden — requires Reader role


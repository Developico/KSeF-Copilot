          format: date-time
          required: false
          description: End date (ISO 8601)
      responses:
        '200':
          description: Sync preview
          schema:
            $ref: '#/definitions/SyncPreviewResponse'
        '401':
          description: Unauthorized
  /ksef/sync/import:
    post:
      operationId: ImportSync
      summary: Import Invoices from KSeF
      description: Imports selected invoices from KSeF based on reference numbers.
      parameters:
        - name: body
          in: body
          required: true
          schema:

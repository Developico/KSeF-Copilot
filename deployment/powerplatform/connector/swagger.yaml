swagger: '2.0'
info:
  title: DVLP-KSeF-PP-Connector
  description: >-
    /PL/: Konektor Developico do KSeF API — zarządzanie fakturami,
    synchronizacja z KSeF, dashboard, wyszukiwanie w rejestrze VAT (Biała Lista).

    /EN/: Developico Connector for the KSeF API — invoice management,
    synchronization with KSeF, dashboard, VAT White List (Biała Lista) lookup.
  version: '1.0'
host: YOUR_FUNCTION_APP.azurewebsites.net
basePath: /api
schemes:
  - https
consumes:
  - application/json
produces:
  - application/json
paths:
  /health:
    get:
      responses:
        '200':
          description: Detailed system health status
          schema:
            $ref: '#/definitions/DetailedHealth'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden — requires Reader role
      summary: Health Check (Detailed)
      description: >-
        Returns detailed system health status including Dataverse connectivity,
        Key Vault access, and KSeF service availability.
      operationId: HealthCheck
      parameters:
        - name: environment
          in: query
          type: string
          required: false
          description: KSeF environment to check (domyślnie z konfiguracji)
          enum:
            - test
            - demo
            - production
      x-ms-visibility: important
  /invoices:
    get:
      responses:
        default:
          description: default
          schema: {}
      summary: List Invoices
      operationId: ListInvoices
      x-ms-visibility: important
      parameters:
        - name: settingId
          in: query
          type: string
          required: false
          description: ID ustawienia firmy (UUID) — filtruje faktury po firmie
        - name: tenantNip
          in: query
          type: string
          required: false
          description: NIP firmy (fallback jeśli brak settingId)
        - name: page
          in: query
          type: integer
          required: false
          description: Numer strony (domyślnie 1)
        - name: pageSize
          in: query
          type: integer
          required: false
          description: Rozmiar strony (domyślnie 20)
        - name: search
          in: query
          type: string
          required: false
          description: Wyszukiwanie tekstowe (numer faktury, NIP, nazwa)
        - name: direction
          in: query
          type: string
          required: false
          description: Kierunek faktury
          enum:
            - income
            - outcome
        - name: status
          in: query
          type: string
          required: false
          description: Status faktury
        - name: dateFrom
          in: query
          type: string
          format: date-time
          required: false
          description: Data od (ISO 8601)
        - name: dateTo
          in: query
          type: string
          format: date-time
          required: false
          description: Data do (ISO 8601)
  /invoices/{id}:
    get:
      responses:
        '200':
          description: Invoice details
          schema:
            $ref: '#/definitions/Invoice'
        default:
          description: default
          schema: {}
      summary: Get Invoice
      operationId: GetInvoice
      parameters:
        - name: id
          in: path
          type: string
          required: true
          description: ID faktury (GUID)
    patch:
      operationId: UpdateInvoice
      summary: Update Invoice
      description: Partially update an existing invoice. All fields are optional.
      parameters:
        - name: id
          in: path
          type: string
          required: true
          description: Invoice ID (Dataverse GUID)
        - name: body
          in: body
          required: true
          schema:
            type: object
            properties:
              mpk:
                type: string
                description: Miejsce powstawania kosztów
                enum:
                  - Consultants
                  - BackOffice
                  - Management
                  - Cars
                  - Legal
                  - Marketing
                  - Sales
                  - Delivery
                  - Finance
                  - Other
              category:
                type: string
                description: Kategoria faktury (max 50 znaków)
              description:
                type: string
                description: Opis (max 500 znaków)
              project:
                type: string
                description: Projekt (max 100 znaków)
              tags:
                type: array
                items:
                  type: string
              paymentStatus:
                type: string
                description: Status płatności
                enum:
                  - pending
                  - paid
              paymentDate:
                type: string
                format: date
                description: Data płatności
              supplierName:
                type: string
                description: Nazwa dostawcy (max 200 znaków)
              supplierNip:
                type: string
                description: NIP dostawcy (max 20 znaków)
              invoiceNumber:
                type: string
                description: Numer faktury (max 100 znaków)
              invoiceDate:
                type: string
                format: date
              dueDate:
                type: string
                format: date
              netAmount:
                type: number
                description: Kwota netto (> 0)
              vatAmount:
                type: number
                description: Kwota VAT (>= 0)
              grossAmount:
                type: number
                description: Kwota brutto (> 0)
              currency:
                type: string
                enum:
                  - PLN
                  - EUR
                  - USD
              exchangeRate:
                type: number
              exchangeDate:
                type: string
              exchangeSource:
                type: string
              grossAmountPln:
                type: number
              aiMpkSuggestion:
                type: string
                enum:
                  - Consultants
                  - BackOffice
                  - Management
                  - Cars
                  - Legal
                  - Marketing
                  - Sales
                  - Delivery
                  - Finance
                  - Other
              aiCategorySuggestion:
                type: string
              aiDescription:
                type: string
              aiConfidence:
                type: number
                description: AI confidence (0–1)
              aiProcessedAt:
                type: string
                format: date-time
      responses:
        '200':
          description: Updated invoice
          schema:
            $ref: '#/definitions/Invoice'
        '400':
          description: Validation error
          schema:
            $ref: '#/definitions/ValidationError'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden — requires Admin role
        '404':
          description: Invoice not found
    delete:
      operationId: DeleteInvoice
      summary: Delete Invoice
      description: Permanently delete an invoice by ID.
      parameters:
        - name: id
          in: path
          type: string
          required: true
          description: Invoice ID (Dataverse GUID)
      responses:
        '204':
          description: Invoice deleted
        '401':
          description: Unauthorized
        '403':
          description: Forbidden — requires Admin role
        '404':
          description: Invoice not found
  /invoices/manual:
    post:
      operationId: CreateManualInvoice
      summary: Create Manual Invoice
      description: Create a new invoice manually (not synced from KSeF).
      parameters:
        - name: body
          in: body
          required: true
          schema:
            type: object
            required:
              - tenantNip
              - tenantName
              - invoiceNumber
              - supplierNip
              - supplierName
              - invoiceDate
              - netAmount
              - vatAmount
              - grossAmount
            properties:
              tenantNip:
                type: string
                pattern: ^\d{10}$
                description: NIP firmy (10 cyfr)
              tenantName:
                type: string
                description: Nazwa firmy (1–255 znaków)
              invoiceNumber:
                type: string
                description: Numer faktury (1–100 znaków)
              supplierNip:
                type: string
                pattern: ^\d{10}$
                description: NIP dostawcy (10 cyfr)
              supplierName:
                type: string
                description: Nazwa dostawcy (1–255 znaków)
              supplierAddress:
                type: string
              supplierCity:
                type: string
              supplierPostalCode:
                type: string
              supplierCountry:
                type: string
              invoiceDate:
                type: string
                format: date
              dueDate:
                type: string
                format: date
              netAmount:
                type: number
                description: Kwota netto (>= 0)
              vatAmount:
                type: number
                description: Kwota VAT (>= 0)
              grossAmount:
                type: number
                description: Kwota brutto (>= 0)
              description:
                type: string
                description: Opis (max 500 znaków)
              mpk:
                type: string
                enum:
                  - Consultants
                  - BackOffice
                  - Management
                  - Cars
                  - Legal
                  - Marketing
                  - Sales
                  - Delivery
                  - Finance
                  - Other
              category:
                type: string
              aiMpkSuggestion:
                type: string
                enum:
                  - Consultants
                  - BackOffice
                  - Management
                  - Cars
                  - Legal
                  - Marketing
                  - Sales
                  - Delivery
                  - Finance
                  - Other
              aiCategorySuggestion:
                type: string
              aiDescription:
                type: string
              aiConfidence:
                type: number
                description: AI confidence (0–1)
      responses:
        '201':
          description: Created invoice
          schema:
            $ref: '#/definitions/Invoice'
        '400':
          description: Validation error
          schema:
            $ref: '#/definitions/ValidationError'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden — requires Admin role
  /dashboard/stats:
    get:
      operationId: GetDashboardStats
      summary: Get Dashboard Stats
      description: Returns invoice statistics for the selected company and period.
      x-ms-visibility: important
      parameters:
        - name: fromDate
          in: query
          type: string
          format: date
          required: false
          description: Data od (YYYY-MM-DD, domyślnie 12 miesięcy wstecz)
        - name: toDate
          in: query
          type: string
          format: date
          required: false
          description: Data do (YYYY-MM-DD, domyślnie dziś)
        - name: settingId
          in: query
          type: string
          required: false
          description: ID ustawienia firmy (UUID)
        - name: tenantNip
          in: query
          type: string
          required: false
          description: NIP firmy (fallback jeśli brak settingId)
      responses:
        '200':
          description: Dashboard statistics
          schema:
            $ref: '#/definitions/DashboardStats'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden — requires Reader role
  /sync:
    post:
      operationId: StartSync
      summary: Start KSeF Sync
      description: Start synchronization of invoices from KSeF for a given company setting.
      parameters:
        - name: body
          in: body
          required: true
          schema:
            type: object
            required:
              - settingId
            properties:
              settingId:
                type: string
                description: ID ustawienia firmy (UUID)
              direction:
                type: string
                description: Kierunek synchronizacji
                default: incoming
                enum:
                  - incoming
                  - outgoing
                  - both
              dateFrom:
                type: string
                format: date-time
                description: Data od (ISO 8601, domyślnie 30 dni wstecz)
              dateTo:
                type: string
                format: date-time
                description: Data do (ISO 8601, domyślnie teraz)
      responses:
        '200':
          description: Sync result
          schema:
            $ref: '#/definitions/SyncResult'
        '400':
          description: Validation error
          schema:
            $ref: '#/definitions/ValidationError'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden — requires Admin role
  /sync/logs:
    get:
      operationId: GetSyncLogs
      summary: Get Sync Logs
      description: Returns history of synchronization logs.
      parameters:
        - name: settingId
          in: query
          type: string
          required: false
          description: Filtruj po ID ustawienia firmy (UUID)
        - name: limit
          in: query
          type: integer
          required: false
          description: Limit wyników (domyślnie 50)
      responses:
        '200':
          description: Sync logs
          schema:
            type: object
            properties:
              logs:
                type: array
                items:
                  type: object
              count:
                type: integer
        '401':
          description: Unauthorized
        '403':
          description: Forbidden — requires Reader role
  /anomalies:
    get:
      operationId: GetAnomalies
      summary: Get Invoice Anomalies
      description: >-
        Detect unusual invoice patterns: amount spikes, new suppliers,
        duplicate suspects, category shifts, and frequency changes.
      x-ms-visibility: important
      parameters:
        - name: settingId
          in: query
          type: string
          required: false
          description: ID ustawienia firmy (UUID)
        - name: tenantNip
          in: query
          type: string
          required: false
          description: NIP firmy (fallback jeśli brak settingId)
        - name: periodDays
          in: query
          type: integer
          required: false
          description: >-
            Okres analizy w dniach (domyślnie 30, zakres 7–365)
        - name: sensitivity
          in: query
          type: number
          required: false
          description: >-
            Próg czułości detekcji — mnożnik odchylenia standardowego
            (domyślnie 2.0, zakres 1–5)
        - name: enabledRules
          in: query
          type: string
          required: false
          description: >-
            Lista aktywnych reguł oddzielona przecinkami
            (amount-spike, new-supplier, duplicate-suspect,
            category-shift, frequency-change)
      responses:
        '200':
          description: Anomaly detection result
          schema:
            $ref: '#/definitions/AnomalyResult'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden — requires Reader role
  /anomalies/summary:
    get:
      operationId: GetAnomaliesSummary
      summary: Get Anomaly Summary
      description: Returns anomaly counts grouped by type and severity for the selected period.
      parameters:
        - name: settingId
          in: query
          type: string
          required: false
          description: ID ustawienia firmy (UUID)
        - name: tenantNip
          in: query
          type: string
          required: false
          description: NIP firmy (fallback jeśli brak settingId)
        - name: periodDays
          in: query
          type: integer
          required: false
          description: Okres analizy w dniach (domyślnie 30, zakres 7–365)
        - name: sensitivity
          in: query
          type: number
          required: false
          description: >-
            Próg czułości detekcji (domyślnie 2.0, zakres 1–5)
        - name: enabledRules
          in: query
          type: string
          required: false
          description: Lista aktywnych reguł oddzielona przecinkami
      responses:
        '200':
          description: Anomaly summary counts
          schema:
            $ref: '#/definitions/AnomalySummary'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden — requires Reader role
  /anomalies/rules:
    get:
      operationId: GetAnomalyRules
      summary: Get Anomaly Detection Rules
      description: >-
        Returns available anomaly detection rules with their parameter
        descriptors and preset configurations.
      parameters: []
      responses:
        '200':
          description: Rule descriptors and presets
          schema:
            type: object
            properties:
              rules:
                type: array
                items:
                  type: object
              presets:
                type: array
                items:
                  type: object
        '401':
          description: Unauthorized
        '403':
          description: Forbidden — requires Reader role
  /settings:
    get:
      operationId: ListSettings
      summary: List Settings
      description: Returns list of company settings (KSeF configurations).
      x-ms-visibility: important
      parameters:
        - name: activeOnly
          in: query
          type: string
          required: false
          description: Tylko aktywne (domyślnie true)
          enum:
            - 'true'
            - 'false'
      responses:
        '200':
          description: Company settings list
          schema:
            type: object
            properties:
              settings:
                type: array
                items:
                  $ref: '#/definitions/Setting'
              count:
                type: integer
        '401':
          description: Unauthorized
        '403':
          description: Forbidden — requires Reader role
  /settings/companies:
    get:
      operationId: ListCompanies
      summary: List Registered Companies
      description: >-
        Returns a lightweight list of companies registered in Dataverse —
        company name, NIP, environment, and setting ID. Useful for dropdowns
        and selectors.
      x-ms-visibility: important
      parameters: []
      responses:
        '200':
          description: List of registered companies
          schema:
            type: object
            properties:
              companies:
                type: array
                items:
                  $ref: '#/definitions/Company'
              count:
                type: integer
        '401':
          description: Unauthorized
        '403':
          description: Forbidden — requires Reader role
  /exchange-rates:
    get:
      operationId: GetExchangeRate
      summary: Get Exchange Rate
      description: Returns NBP exchange rate for a given currency and date.
      parameters:
        - name: currency
          in: query
          type: string
          required: true
          description: Kod waluty
          enum:
            - EUR
            - USD
        - name: date
          in: query
          type: string
          format: date
          required: false
          description: Data kursu (YYYY-MM-DD, domyślnie dziś)
      responses:
        '200':
          description: Exchange rate data
          schema:
            $ref: '#/definitions/ExchangeRate'
        '400':
          description: Invalid currency or date
        '401':
          description: Unauthorized
        '403':
          description: Forbidden — requires Reader role
  /documents/extract:
    post:
      operationId: ExtractDocument
      summary: Extract Invoice Data from Document
      description: >-
        Extracts structured invoice data from an uploaded document (PDF or image)
        using AI (OCR/Vision). Returns supplier info, amounts, line items,
        and suggested MPK/category classification.
      parameters:
        - name: body
          in: body
          required: true
          schema:
            type: object
            required:
              - fileName
              - mimeType
              - content
            properties:
              fileName:
                type: string
                description: Nazwa pliku (max 255 znaków)
              mimeType:
                type: string
                description: >-
                  Typ MIME dokumentu (application/pdf, image/jpeg, image/png,
                  image/webp, image/tiff)
                enum:
                  - application/pdf
                  - image/jpeg
                  - image/png
                  - image/webp
                  - image/tiff
              content:
                type: string
                description: Zawartość pliku zakodowana w Base64 (max ~10 MB)
      responses:
        '200':
          description: Extraction result with structured invoice data
          schema:
            $ref: '#/definitions/ExtractionResult'
        '400':
          description: Invalid request or file too large
          schema:
            $ref: '#/definitions/ValidationError'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden — requires Admin role
        '422':
          description: Extraction failed (unreadable document)
          schema:
            type: object
            properties:
              success:
                type: boolean
              error:
                type: string
              extractedAt:
                type: string
                format: date-time
  /ai/categorize:
    post:
      operationId: AICategorize
      summary: AI Categorize Invoice
      description: Use AI to suggest MPK and category for an invoice.
      parameters:
        - name: body
          in: body
          required: true
          schema:
            type: object
            required:
              - invoiceId
            properties:
              invoiceId:
                type: string
                description: ID faktury (UUID)
              supplierName:
                type: string
                description: Nazwa dostawcy (opcjonalnie nadpisuje dane z faktury)
              supplierNip:
                type: string
                description: NIP dostawcy (opcjonalnie nadpisuje dane z faktury)
              items:
                type: array
                items:
                  type: string
                description: Opisy pozycji fakturowych
              grossAmount:
                type: number
                description: Kwota brutto (opcjonalnie nadpisuje dane z faktury)
      responses:
        '200':
          description: AI categorization result
          schema:
            $ref: '#/definitions/AiCategorizeResult'
        '400':
          description: Validation error
          schema:
            $ref: '#/definitions/ValidationError'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden — requires Admin role
        '404':
          description: Invoice not found
  /ai/batch-categorize:
    post:
      operationId: AIBatchCategorize
      summary: AI Batch Categorize Invoices
      description: >-
        Use AI to suggest MPK and category for multiple invoices in one call.
        Processes all specified invoices and saves AI suggestions to Dataverse.
        If autoApply is enabled, also writes AI results to the actual invoice fields.
      parameters:
        - name: body
          in: body
          required: true
          schema:
            type: object
            required:
              - invoiceIds
            properties:
              invoiceIds:
                type: array
                items:
                  type: string
                description: Lista ID faktur do kategoryzacji (UUIDs)
              autoApply:
                type: boolean
                description: >-
                  Automatycznie zastosuj wyniki AI do pól faktury mpk/category/description
                  (domyślnie false)
      responses:
        '200':
          description: Batch categorization result
          schema:
            $ref: '#/definitions/BatchCategorizeResult'
        '400':
          description: Validation error
          schema:
            $ref: '#/definitions/ValidationError'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden — requires Admin role
  /vat/lookup:
    post:
      operationId: VatLookup
      summary: VAT White List Lookup
      description: >-
        Search for a subject in the White List of VAT Taxpayers (Biała Lista Podatników VAT)
        by NIP or REGON. Returns company details, VAT status, registered bank accounts.
      x-ms-visibility: important
      parameters:
        - name: body
          in: body
          required: true
          schema:
            type: object
            properties:
              nip:
                type: string
                pattern: ^\d{10}$
                description: NIP (10 cyfr)
              regon:
                type: string
                description: REGON (9 lub 14 cyfr)
      responses:
        '200':
          description: VAT lookup result
          schema:
            $ref: '#/definitions/VatLookupResult'
        '400':
          description: Invalid NIP/REGON
          schema:
            $ref: '#/definitions/ValidationError'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden — requires Reader role
        '404':
          description: Subject not found
  /vat/validate/{nip}:
    get:
      operationId: VatValidate
      summary: Validate NIP Checksum
      description: >-
        Offline NIP validation (checksum algorithm only, no API call).
        Returns whether the NIP number has a valid checksum.
      parameters:
        - name: nip
          in: path
          type: string
          required: true
          description: NIP do walidacji (10 cyfr)
      responses:
        '200':
          description: NIP validation result
          schema:
            $ref: '#/definitions/VatValidateResult'
  /vat/check-account:
    post:
      operationId: VatCheckAccount
      summary: Check Bank Account in VAT White List
      description: >-
        Verify whether a bank account number is registered for a given NIP
        in the White List of VAT Taxpayers.
      parameters:
        - name: body
          in: body
          required: true
          schema:
            type: object
            required:
              - nip
              - account
            properties:
              nip:
                type: string
                pattern: ^\d{10}$
                description: NIP (10 cyfr)
              account:
                type: string
                description: Numer rachunku bankowego (NRB, 26 cyfr)
      responses:
        '200':
          description: Bank account check result
          schema:
            $ref: '#/definitions/VatCheckAccountResult'
        '400':
          description: Invalid NIP or account number
          schema:
            $ref: '#/definitions/ValidationError'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden — requires Reader role
  /ksef/testdata/environments:
    get:
      operationId: GetTestdataEnvironments
      summary: Get KSeF Environments
      description: >-
        Returns available KSeF environments (test, demo, production) with their
        base URLs, descriptions, and available permissions.
      x-ms-visibility: important
      parameters: []
      responses:
        '200':
          description: KSeF environment information
          schema:
            $ref: '#/definitions/EnvironmentsResult'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden — requires Reader role
  /ksef/testdata/generate:
    post:
      operationId: GenerateTestData
      summary: Generate Test Invoices
      description: >-
        Generate realistic test invoices in Dataverse for a given company.
        Only allowed for test and demo environments.
      parameters:
        - name: body
          in: body
          required: true
          schema:
            type: object
            required:
              - nip
            properties:
              nip:
                type: string
                pattern: ^\d{10}$
                description: NIP firmy (10 cyfr)
              companyId:
                type: string
                description: ID ustawienia firmy (UUID, opcjonalny — fallback na NIP)
              count:
                type: integer
                description: Liczba faktur do wygenerowania (1–100, domyślnie 10)
                minimum: 1
                maximum: 100
              fromDate:
                type: string
                format: date
                description: Data od (YYYY-MM-DD)
              toDate:
                type: string
                format: date
                description: Data do (YYYY-MM-DD)
              paidPercentage:
                type: number
                description: Procent faktur oznaczonych jako opłacone (0–100)

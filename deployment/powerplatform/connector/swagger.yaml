      parameters:
        - name: body
          in: body
          required: true
          schema:
            $ref: '#/definitions/MpkCenterCreate'
      responses:
        '201':
          description: Created MPK center
          schema:
            type: object
            properties:
              mpkCenter:
                $ref: '#/definitions/MpkCenter'
        '400':
          description: Validation failed
        '401':
          description: Unauthorized
        '403':
          description: Forbidden — requires Admin role
  /mpk-centers/{id}:
    get:
      operationId: GetMpkCenter
      summary: Get MPK Center
      description: Returns a single MPK center by ID.
      parameters:
        - name: id
          in: path
          type: string
          required: true
          description: MPK center UUID
      responses:
        '200':
          description: MPK center
          schema:
            type: object
            properties:
              mpkCenter:
                $ref: '#/definitions/MpkCenter'

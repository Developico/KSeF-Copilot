          description: Unauthorized
        '404':
          description: MPK center not found
    patch:
      operationId: UpdateMpkCenter
      summary: Update MPK Center
      description: Updates an existing MPK center. Requires Admin role.
      parameters:
        - name: id
          in: path
          type: string
          required: true
          description: MPK center UUID
        - name: body
          in: body
          required: true
          schema:
            $ref: '#/definitions/MpkCenterUpdate'
      responses:
        '200':
          description: Updated MPK center
          schema:
            type: object
            properties:
              mpkCenter:
                $ref: '#/definitions/MpkCenter'
        '400':
          description: Validation failed
        '401':
          description: Unauthorized
        '403':

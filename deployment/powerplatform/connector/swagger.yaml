          required: false
          description: ID ustawienia firmy (UUID)
        - name: tenantNip
          in: query
          type: string
          required: false
          description: NIP firmy (fallback jeśli brak settingId)
      responses:
        '200':
          description: Grouped forecast by MPK
          schema:
            $ref: '#/definitions/GroupedForecastResponse'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden — requires Reader role
  /forecast/by-category:
    get:

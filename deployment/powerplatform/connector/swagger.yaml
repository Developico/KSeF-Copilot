  /forecast/by-supplier:
    get:
      operationId: GetForecastBySupplier
      summary: Get Forecast by Supplier
      description: >-
        Returns expense forecast for top-N suppliers by gross amount.
        Groups are sorted by total forecast amount descending.
      parameters:
        - name: horizon

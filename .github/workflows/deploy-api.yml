name: Deploy API to Azure Functions

on:
  push:
    branches: [main]
    paths:
      - 'api/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
  workflow_dispatch:

env:
  AZURE_FUNCTIONAPP_NAME: dvlp-ksef-func
  NODE_VERSION: '20.x'

permissions:
  id-token: write
  contents: read

jobs:
  deploy-api:
    name: Build & Deploy API
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck (api)
        run: npm run typecheck --workspace=api

      - name: Test (api)
        run: npm test --workspace=api

      - name: Build (api)
        run: npm run build --workspace=api

      - name: Prepare Functions package
        working-directory: api
        run: |
          # Flex Consumption requires node_modules in the deploy package (no remote build).
          # --no-workspaces prevents npm from hoisting deps to root node_modules.
          rm -rf node_modules
          npm install --omit=dev --no-workspaces --ignore-scripts
          # Verify critical dependency is present
          test -d node_modules/@azure/functions && echo "✓ @azure/functions found" || { echo "✗ @azure/functions missing!"; exit 1; }
          # Remove source/dev files to reduce package size (functions-action doesn't use .funcignore)
          rm -rf src tests scripts .vscode .env .env.local local.settings.json
          rm -f vitest.config.ts tsconfig.json *.md LICENSE

      - name: Azure Login
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Create deployment package
        working-directory: api
        run: |
          # Verify entry point exists
          test -f dist/src/functions/index.js && echo "✓ Entry point found" || { echo "✗ Entry point missing!"; ls -R dist/; exit 1; }
          # Create zip from the api directory (top-level, so host.json/package.json are at root of zip)
          zip -r ../deploy-package.zip . -x "*.ts" ".git*"
          echo "✓ Package created ($(du -h ../deploy-package.zip | cut -f1))"

      - name: Deploy to Azure Functions
        run: |
          # Flex Consumption SCM can return 502 during cold start — retry with backoff
          for attempt in 1 2 3; do
            echo "Deploy attempt $attempt..."
            az functionapp deployment source config-zip \
              --name ${{ env.AZURE_FUNCTIONAPP_NAME }} \
              --resource-group rg-ksef \
              --src deploy-package.zip \
              --timeout 300 && break
            echo "Attempt $attempt failed, waiting 30s before retry..."
            sleep 30
          done

      - name: Smoke test
        continue-on-error: true
        run: |
          HOSTNAME=$(az functionapp show --name ${{ env.AZURE_FUNCTIONAPP_NAME }} --resource-group rg-ksef --query properties.defaultHostName -o tsv)
          echo "Resolved hostname: ${HOSTNAME}"
          echo "Waiting for deployment to stabilize..."
          sleep 40
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://${HOSTNAME}/api/health" || echo "000")
          if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 400 ]; then
            echo "✓ Smoke test passed (HTTP $STATUS)"
          else
            echo "⚠ Smoke test returned HTTP $STATUS — check deployment"
            exit 1
          fi

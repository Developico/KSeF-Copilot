  /invoices/{id}/attachments:
    post:
      operationId: UploadAttachment
      summary: Upload Invoice Attachment
      description: >-
        Upload a file attachment to an invoice (PDF, image, etc.).
        Content must be Base64-encoded.
      x-ms-visibility: important
      parameters:
        - name: id
          in: path
          type: string
          required: true
          description: Invoice ID (GUID)
        - name: body
          in: body
          required: true
          schema:
            type: object
            required:
              - fileName
              - mimeType
              - content
            properties:
              fileName:
                type: string
                description: File name (max 255 characters)
              mimeType:
                type: string
                description: MIME type of the file
              content:
                type: string
                description: Base64-encoded file content
              description:
                type: string
                description: Optional description (max 500 characters)
      responses:
        '201':
          description: Attachment uploaded
          schema:
            $ref: '#/definitions/Attachment'
        '400':
          description: Validation error
          schema:
            $ref: '#/definitions/ValidationError'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden — requires Admin role
        '404':
          description: Invoice not found
    get:
      operationId: ListAttachments
      summary: List Invoice Attachments
      description: Returns all attachments for a given invoice.
      x-ms-visibility: important
      parameters:
        - name: id
          in: path
          type: string
          required: true
          description: Invoice ID (GUID)
      responses:
        '200':
          description: List of attachments
          schema:
            type: object
            properties:
              attachments:
                type: array
                items:
                  $ref: '#/definitions/Attachment'
              count:
                type: integer
        '401':
          description: Unauthorized
        '403':
          description: Forbidden — requires Reader role
        '404':
          description: Invoice not found
  /attachments/{id}/download:
    get:
      operationId: DownloadAttachment
      summary: Download Attachment
      description: Returns the Base64-encoded content of an attachment.
      parameters:
        - name: id
          in: path
          type: string
          required: true
          description: Attachment ID (GUID)
      responses:
        '200':
          description: Attachment content
          schema:
            type: object
            properties:
              content:
                type: string
                description: Base64-encoded file content
        '401':
          description: Unauthorized
        '403':
          description: Forbidden — requires Reader role
        '404':
          description: Attachment not found
  /attachments/{id}:
    delete:
      operationId: DeleteAttachment
      summary: Delete Attachment
      description: Permanently delete an attachment by ID.
      parameters:
        - name: id
          in: path
          type: string
          required: true
          description: Attachment ID (GUID)
      responses:
        '204':
          description: Attachment deleted
        '401':
          description: Unauthorized
        '403':
          description: Forbidden — requires Admin role
        '404':
          description: Attachment not found
  /attachments/config:
    get:
      operationId: GetAttachmentConfig
      summary: Get Attachment Configuration
      description: Returns allowed file types, max size, and other attachment constraints.
      parameters: []
      responses:
        '200':
          description: Attachment configuration
          schema:
            type: object
            properties:
              maxSizeBytes:
                type: integer
              maxSizeMB:
                type: number
              allowedMimeTypes:
                type: array
                items:
                  type: string
  /health/detailed:
    get:
      operationId: HealthCheckDetailed

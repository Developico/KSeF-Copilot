      parameters:
        - name: environment
          in: query
          type: string
          required: false
          description: KSeF environment to check
          enum:
            - test
            - demo
            - production
      responses:
        '200':
          description: Detailed system health status
          schema:
            $ref: '#/definitions/DetailedHealth'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden — requires Reader role
  /mpk-centers:
    get:
      operationId: ListMpkCenters
      summary: List MPK Centers
      description: Returns MPK cost centers for a given company setting.
      x-ms-visibility: important
      parameters:
        - name: settingId
          in: query
          type: string
          required: false
          description: Company setting UUID (filters by company)
        - name: activeOnly
          in: query
          type: string
          required: false
          description: Only active centers (default true)
          enum:
            - 'true'
            - 'false'
      responses:
        '200':
          description: MPK centers list
          schema:
            type: object
            properties:
              mpkCenters:
                type: array
                items:
                  $ref: '#/definitions/MpkCenter'
              count:
                type: integer
        '401':
          description: Unauthorized
        '403':
          description: Forbidden — requires Reader role
    post:
      operationId: CreateMpkCenter
      summary: Create MPK Center
      description: Creates a new MPK cost center. Requires Admin role.

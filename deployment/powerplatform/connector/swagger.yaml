      description: Returns the current KSeF connection status and token information.
      parameters:
        - name: companyId
          in: query
          type: string
          required: false
          description: Company setting ID (UUID)
        - name: nip
          in: query
          type: string
          required: false
          description: NIP firmy
        - name: environment
          in: query
          type: string
          required: false
          description: KSeF environment
          enum:
            - test
            - demo
            - production
      responses:
        '200':
          description: KSeF status
